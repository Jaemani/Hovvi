name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm pack --dry-run
      - run: npm run package:boundary-check
      - run: npm run native:check
      - run: npm run native:adapter-check
      - run: npm run mosh:vendor:verify
      - run: brew list pkgconf protobuf >/dev/null 2>&1 || brew install pkgconf protobuf
      - run: npm run native:upstream-check
      - run: npm run native:upstream-lib
      - run: npm run ios:upstream-cabi-link-check
      - run: brew list tmux mosh >/dev/null 2>&1 || brew install tmux mosh
      - run: npm run native:mosh-server-harness-check
      - run: npm run native:relay-attach-check
      - run: npm run native:relay-process-attach-check
      - run: npm run ios:simulator-preflight
      - run: npm run ios:simulator-build-check
      - run: npm run ios:simulator-app-bundle-check
      - run: npm run ios:simulator-install-check
      - run: npm run ios:simulator-launch-check
      - run: npm run ios:simulator-screenshot-check
      - run: swift build
        working-directory: apps/ios
      - run: swift build --product HovviMobileApp
        working-directory: apps/ios
      - run: swift run HovviMobileCoreSmoke
        working-directory: apps/ios
