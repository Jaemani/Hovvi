name: Feature request
description: Propose a Hovvi capability or product behavior
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow is currently painful or impossible?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Hovvi do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Mac agent
        - Relay
        - Mobile app
        - mosh compatibility
        - tmux integration
        - packaging/release
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Security, compatibility, performance, or UX constraints.
